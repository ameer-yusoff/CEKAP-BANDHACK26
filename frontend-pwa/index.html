<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CEKAP - Emergency Helpline</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="glass-header">
            <h1>CEKAP</h1>
            <p>Centralized Emergency Knitted Assistance Platform</p>
        </header>

        <main class="interaction-area">
            <div class="status-indicator" id="statusText">Ready to help.</div>
            
            <div class="glass-panel text-display">
                <p id="transcriptOutput" class="placeholder-text">Please say "Hello" to initiate the system, wait for a reply, then state your emergency and location.</p>
            </div>

            <button id="micButton" class="mic-btn liquid-btn">
                <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="22"></line>
                </svg>
            </button>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
